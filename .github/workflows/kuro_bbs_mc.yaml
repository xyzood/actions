name: Kuro BBS MC
on:
    schedule:
        - cron: "0 18 * * *"
    workflow_dispatch:

jobs:
    auto-checkin:
        runs-on: ubuntu-latest
        steps:
            # 1. 检出代码
            - name: Checkout Code
              run: |
                  git clone https://github.com/xyzood/pub_scripts.git

            # 2. 设置 Python 环境
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.13"

            # 3. 安装依赖
            - name: Install dependencies
              working-directory: pub_scripts
              run: |
                  python -m pip install --upgrade pip
                  pip install requests

            # 4. 运行脚本
            - name: Run script
              working-directory: pub_scripts
              env:
                  WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
              run: |
                  python kuro_bbs_mc.py
